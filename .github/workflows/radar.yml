name: Job Radar

on:
  schedule:
    # Every hour, on the hour (UTC). Adjust as you like.
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          RADAR_BACKEND: google
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          # Optional - only needed if you enable llm_relevance / ai_lab_pages:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m radar.pipeline
