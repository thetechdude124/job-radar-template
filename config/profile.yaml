# ---------------------------------------------------------------------------
# Work authorization. You are not silently filtered out; instead roles are
# flagged in the Work Auth column so you can decide.
# ---------------------------------------------------------------------------
work_auth:
  needs_sponsorship: false      # set true if you need visa sponsorship
  flag_us_citizen_required: true
  flag_no_sponsorship: true
  exclude_us_citizen_required: false
  exclude_no_sponsorship: false

# ---------------------------------------------------------------------------
# Optional LLM relevance pass. Off unless a key is present + enabled here.
# When disabled, filtering is fully deterministic and free.
# ---------------------------------------------------------------------------
llm_relevance:
  enabled: false
  model: gpt-4o-mini
  # Short description of you, injected as context when scoring borderline roles.
  # Replace this with your own background (major, year, target roles, strengths)
  # for smarter Match/Maybe tagging. Optional - only used if llm_relevance is on.
  profile_summary: >
    A university student looking for internships. Edit this line with your major,
    year, the kinds of roles you want, and your key strengths.
